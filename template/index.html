<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Docker App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<div class="card text-center bg-white text-dark">
    <h1 class="mb-3">🚀 Flask + Docker App</h1>

    <p class="lead">
        Deployed using Docker, GitHub & Flask
    </p>

    <hr>

    <div class="row">
        <div class="col">
            <h5>⚡ Fast</h5>
            <p>Lightweight Flask app</p>
        </div>

        <div class="col">
            <h5>🐳 Dockerized</h5>
            <p>Runs in container</p>
        </div>

        <div class="col">
            <h5>🌐 Deploy Ready</h5>
            <p>Render / AWS ready</p>
        </div>
    </div>

    <button class="btn btn-primary mt-3">
        Explore More
    </button>
</div>

</body>
</html>
